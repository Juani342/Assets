<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halo Project - JuanCamotes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* FONDO TIPO HALO: Gradiente oscuro con toque azul neón */
        body {
            background: radial-gradient(circle, #1a2a3a 0%, #05080a 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* NAVBAR CON ESTILO METÁLICO */
        .navbar {
            background: rgba(0, 0, 0, 0.8) !important;
            border-bottom: 2px solid #00d4ff;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        /* TARJETAS ESTILO HUD DE HALO */
        .card {
            background: rgba(20, 30, 40, 0.9);
            border: 1px solid #00d4ff;
            border-radius: 0;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        .card-header {
            background: #004a66 !important;
            color: #00d4ff !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            border-bottom: 1px solid #00d4ff;
        }

        /* EL CANVAS Y LA IMAGEN */
        canvas, img {
            border: 2px solid #00d4ff !important;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        /* FOOTER */
        footer {
            background: black;
            border-top: 1px solid #333;
        }

        .highlight {
            color: #00d4ff;
            text-shadow: 0 0 5px #00d4ff;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark shadow-sm">
        <div class="container d-flex justify-content-center">
            <span class="navbar-brand mb-0 h1 highlight">UNSC DATABASE - ARCHIVE 117</span>
        </div>
    </nav>

    <main class="container my-auto py-5">
        <div class="text-center mb-5">
            <h1 class="display-4 fw-bold highlight">PROJECT <span class="text-white">CANVAS</span></h1>
            <p class="lead">Recreación táctica de entornos espaciales</p>
        </div>

        <div class="row g-5 align-items-center">
            <div class="col-lg-6">
                <div class="card shadow">
                    <div class="card-header text-center">Neural Simulation</div>
                    <div class="card-body d-flex justify-content-center bg-black p-3">
                        <canvas id="canvasArt" width="400" height="400"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-6">
                <div class="card shadow border-0">
                    <div class="card-header text-center">Visual Reference</div>
                    <div class="card-body d-flex justify-content-center bg-black p-3">
                        <img src="img/imagen.png" alt="Referencia Halo" class="img-fluid" style="max-height: 400px; width: auto;">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-white py-3 mt-auto">
        <div class="container text-center">
            <p class="mb-0 small opacity-75 text-uppercase">Operator: <span class="highlight">JuanCamotes</span> | Classified Information</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
