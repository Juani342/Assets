<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Art Project - Recreación Programática</title>
    <link rel="shortcut icon" href="assets/img/favicon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">🎨 Generador de Arte Digital</span>
        </div>
    </nav>

    <main class="container my-auto py-5">
        <div class="row g-4 align-items-center">
            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center">Dibujo Programático (JS)</div>
                    <div class="card-body d-flex justify-content-center bg-white">
                        <canvas id="canvasArt" width="400" height="400" class="border"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white text-center">Imagen Original (JPG)</div>
                    <div class="card-body d-flex justify-content-center bg-white">
                        <img src="assets/img/imagen.jpg" alt="Referencia" class="img-fluid border" style="max-height: 400px;">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-1">Desarrollado por: <strong>JuanCamotes</strong></p>
            <p class="small text-muted">Ingeniería de Sistemas - Proyecto Canvas API</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
